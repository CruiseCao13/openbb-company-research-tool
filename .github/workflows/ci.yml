name: CI

on:
  push:
  pull_request:

jobs:
  rust-and-python-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rust format
        run: cargo fmt --manifest-path research-rs/Cargo.toml --all -- --check
      - name: Rust clippy
        run: cargo clippy --manifest-path research-rs/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Rust tests
        run: cargo test --manifest-path research-rs/Cargo.toml
      - name: Python provider syntax
        run: python3 -m py_compile providers/*.py
      - name: Build CLI and doctor smoke
        run: |
          cargo build --manifest-path research-rs/Cargo.toml --bin research-rs
          research-rs/target/debug/research-rs doctor
