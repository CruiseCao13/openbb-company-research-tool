[providers]
default_us = "openbb"
default_cn = "akshare"
allow_mock = true
timeout_seconds = 30

[ai]
mode = "compact"
model = "gpt-4.1-mini"
require_external_ai = false
cache = true
timeout_seconds = 60
max_retries = 2

[batch]
workers = 4
max_attempts = 2

[report]
lang = "en"
pdf = true
dashboard = true
charts = true

[quality]
content_judge = true
visual_lint = true
