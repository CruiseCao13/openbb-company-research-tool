[project]
name = "openbb-company-research-tool"
version = "3.0.0"
description = "A data-first company research workflow with benchmark comparison, interactive charts, sanity checks, optional AI review, and category-aware scoring."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Cruise Cao" }]
dependencies = [
    "openbb",
    "openbb-yfinance",
    "yfinance",
    "pandas",
    "matplotlib",
    "plotly",
    "openai",
    "pydantic",
    "rich",
]
